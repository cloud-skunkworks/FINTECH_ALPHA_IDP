apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: eks-microservice
  title: EKS Microservice
  description: >
    Provisions a Kubernetes namespace, IRSA role, ECR repository, CloudWatch log group,
    and HPA for a new EKS-hosted microservice. Compliant with PCI-DSS v4.0 and SOC 2 Type II.
  tags: [eks, kubernetes, aws, recommended, pci-dss]
  annotations:
    backstage.io/techdocs-ref: dir:.
spec:
  owner: platform-engineering
  type: service

  parameters:
    - title: Service Details
      required: [service_name, owner_team, cost_centre]
      properties:
        service_name:
          title: Service Name
          type: string
          pattern: "^[a-z][a-z0-9-]+$"
          minLength: 3
          maxLength: 40
          description: "Lowercase alphanumeric with hyphens (e.g. payments-api). Used as the Kubernetes namespace and AWS resource prefix."
          ui:autofocus: true
          ui:help: "Must be globally unique within the environment."
        owner_team:
          title: Owner Team
          type: string
          description: "GitHub team slug. Used for RBAC and FinOps attribution."
          examples:
            - payments-team
            - fraud-team
        cost_centre:
          title: Cost Centre
          type: string
          pattern: "^CC-[0-9]{4}$"
          description: "Format: CC-NNNN. Required for all environments."
          ui:help: "Contact FinOps to get your team's cost centre code."

    - title: Environment & Sizing
      required: [environment, size]
      properties:
        environment:
          title: Environment
          type: string
          enum: [dev, uat, prod]
          default: dev
          description: "Target deployment environment. Prod requires additional approval."
        size:
          title: Service Size
          type: string
          enum: [xs, sm, md, lg]
          default: sm
          description: "Pre-approved CPU/memory tier."
          enumNames:
            - "XS — 0.25 vCPU / 256MB (dev/test only)"
            - "SM — 0.5 vCPU / 512MB"
            - "MD — 1 vCPU / 1GB"
            - "LG — 2 vCPU / 2GB"
        region:
          title: AWS Region
          type: string
          enum: [ca-central-1, us-east-1]
          default: ca-central-1
          description: "Approved regions only. Other regions are blocked by SCP."

  steps:
    - id: fetch-template
      name: Fetch CDK Workspace Template
      action: fetch:template
      input:
        url: ./skeleton
        values:
          service_name: ${{ parameters.service_name }}
          owner_team: ${{ parameters.owner_team }}
          cost_centre: ${{ parameters.cost_centre }}
          environment: ${{ parameters.environment }}
          size: ${{ parameters.size }}
          region: ${{ parameters.region }}

    - id: call-idp-api
      name: Register Provisioning Job
      action: http:backstage:request
      input:
        method: POST
        path: /api/proxy/idp-platform-api/v1/provision
        body:
          service_name: ${{ parameters.service_name }}
          environment: ${{ parameters.environment }}
          template_id: eks-microservice
          size: ${{ parameters.size }}
          owner_team: ${{ parameters.owner_team }}
          cost_centre: ${{ parameters.cost_centre }}
          region: ${{ parameters.region }}

    - id: create-pr
      name: Create GitHub Pull Request
      action: publish:github:pull-request
      input:
        repoUrl: github.com?repo=idp-platform&owner=your-org
        title: "feat(idp): provision ${{ parameters.service_name }}-${{ parameters.environment }}"
        branchName: "idp/provision-${{ parameters.service_name }}-${{ parameters.environment }}-${{ '' | now | date('X') }}"
        description: |
          ## IDP Provisioning Request

          | Field | Value |
          |---|---|
          | Service | `${{ parameters.service_name }}` |
          | Template | `eks-microservice` |
          | Environment | `${{ parameters.environment }}` |
          | Size | `${{ parameters.size }}` |
          | Owner Team | `${{ parameters.owner_team }}` |
          | Cost Centre | `${{ parameters.cost_centre }}` |
          | Region | `${{ parameters.region }}` |

          ### What will be provisioned
          - Kubernetes namespace: `${{ parameters.service_name }}`
          - IRSA IAM role: `irsa-${{ parameters.service_name }}-${{ parameters.environment }}`
          - ECR repository: `${{ parameters.service_name }}-${{ parameters.environment }}`
          - CloudWatch Log Group: `/idp/workloads/${{ parameters.environment }}/${{ parameters.service_name }}`
          - Kubernetes ServiceAccount (with IRSA annotation)

          Generated by Backstage Scaffolder. CI will validate and post CDK diff + cost estimate.

    - id: register-component
      name: Register Component in Catalog
      action: catalog:register
      input:
        repoContentsUrl: ${{ steps['create-pr'].output.remoteUrl }}
        catalogInfoPath: /catalog-info.yaml
        optional: true

  output:
    links:
      - title: Pull Request
        url: ${{ steps['create-pr'].output.remoteUrl }}
        icon: github
      - title: Provisioning Job Status
        url: /catalog/default/component/${{ parameters.service_name }}
        icon: dashboard
    text:
      - title: Next Steps
        content: |
          **Your infrastructure is being provisioned!**

          1. Approve the pull request (auto-approved for `dev`)
          2. After merge, CDK will deploy within ~10 minutes
          3. Poll `GET /v1/status/<job_id>` or check this page for live status
          4. Once complete, push your container image to: `<ecr_uri>:latest`
          5. Create a Kubernetes Deployment referencing the provisioned namespace and ServiceAccount

          **Target:** ≤ 15 minutes from now to running infrastructure.
